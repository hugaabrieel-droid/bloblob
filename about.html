<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About · Hugaabrieel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

[data-theme="dark"]{
  --bg-base:#050a18;--bg2:#060d1e;
  --glass:rgba(255,255,255,0.08);--glass2:rgba(255,255,255,0.13);
  --glass-hover:rgba(255,255,255,0.16);
  --glass-border:rgba(255,255,255,0.18);--glass-border2:rgba(255,255,255,0.28);
  --text:#f0f4ff;--muted:rgba(240,244,255,0.55);--muted2:rgba(240,244,255,0.35);
  --nav-bg:rgba(5,10,24,0.72);--footer-bg:rgba(5,10,24,0.80);
  --orb1:rgba(110,231,183,0.13);--orb2:rgba(167,139,250,0.15);
  --orb3:rgba(249,168,212,0.10);--orb4:rgba(96,165,250,0.10);
  --card-shine:rgba(255,255,255,0.04);
  --sci-opacity:0.10;
}
[data-theme="light"]{
  --bg-base:#e8f0fe;--bg2:#dce8fc;
  --glass:rgba(255,255,255,0.55);--glass2:rgba(255,255,255,0.72);
  --glass-hover:rgba(255,255,255,0.80);
  --glass-border:rgba(100,140,200,0.22);--glass-border2:rgba(100,140,200,0.40);
  --text:#0d1b3e;--muted:rgba(13,27,62,0.60);--muted2:rgba(13,27,62,0.35);
  --nav-bg:rgba(220,232,252,0.85);--footer-bg:rgba(210,225,250,0.85);
  --orb1:rgba(52,211,153,0.20);--orb2:rgba(139,92,246,0.18);
  --orb3:rgba(244,114,182,0.15);--orb4:rgba(59,130,246,0.15);
  --card-shine:rgba(255,255,255,0.55);
  --sci-opacity:0.07;
}
:root{
  --accent1:#6EE7B7;--accent2:#A78BFA;--accent3:#F9A8D4;--accent4:#60A5FA;
  --gold:#FFD27F;
  --blur:blur(20px);--blur2:blur(32px);
}

html{scroll-behavior:smooth}
body{
  font-family:'Outfit',sans-serif;background:var(--bg-base);color:var(--text);
  overflow-x:hidden;min-height:100vh;
  transition:background 0.55s ease,color 0.55s ease;
  user-select:none;-webkit-user-select:none;-moz-user-select:none;
}

.bg-static{position:fixed;inset:0;z-index:0;background:var(--bg-base);transition:background 0.55s ease}

.orb{position:fixed;border-radius:50%;filter:blur(80px);z-index:0;pointer-events:none;
  animation:orbDrift 22s ease-in-out infinite alternate;
  transition:background 0.55s ease,opacity 0.55s ease}
.orb1{width:500px;height:500px;background:var(--orb1);top:-120px;left:-150px}
.orb2{width:400px;height:400px;background:var(--orb2);bottom:-80px;right:-100px;animation-delay:-5s}
.orb3{width:280px;height:280px;background:var(--orb3);top:40%;left:60%;animation-delay:-10s}
.orb4{width:320px;height:320px;background:var(--orb4);top:20%;right:20%;animation-delay:-8s}
@keyframes orbDrift{
  0%{transform:translate(0,0) scale(1)}
  33%{transform:translate(30px,-20px) scale(1.06)}
  66%{transform:translate(-15px,35px) scale(0.96)}
  100%{transform:translate(20px,15px) scale(1.04)}
}

/* sci particles */
#sci-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.sci-elem{position:absolute;pointer-events:none;opacity:0;animation:sciFloat linear infinite;color:var(--accent1);}
@keyframes sciFloat{
  0%{opacity:0;transform:translateY(0) rotate(0deg) scale(0.85)}
  8%{opacity:var(--sci-opacity)}
  85%{opacity:calc(var(--sci-opacity)*0.5)}
  100%{opacity:0;transform:translateY(-110vh) rotate(var(--rot,360deg)) scale(1.1)}
}
.hex-ring{position:absolute;border-radius:50%;border:1.5px solid;animation:hexSpin linear infinite;opacity:0.07;transition:border-color 0.55s}
@keyframes hexSpin{from{transform:rotate(0deg) scale(1)}to{transform:rotate(360deg) scale(1.04)}}
.mol-node{position:absolute;width:6px;height:6px;border-radius:50%;animation:molPulse 3s ease-in-out infinite;opacity:0.12}
@keyframes molPulse{0%,100%{transform:scale(1);opacity:0.12}50%{transform:scale(1.8);opacity:0.22}}

.top-bar{
  position:fixed;top:0;width:100%;z-index:200;
  display:flex;align-items:center;justify-content:space-between;padding:0.9rem 2.5rem;
  background:var(--nav-bg);
  backdrop-filter:var(--blur2) saturate(1.8);-webkit-backdrop-filter:var(--blur2) saturate(1.8);
  border-bottom:1px solid var(--glass-border);
  transition:background 0.55s ease,border-color 0.55s ease;
}
.nav-logo{
  font-family:'DM Serif Display',serif;font-size:1.2rem;
  background:linear-gradient(135deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:0.01em;cursor:pointer;text-decoration:none;
}
.theme-btn{
  width:52px;height:28px;border-radius:999px;cursor:pointer;
  border:1.5px solid var(--glass-border2);background:var(--glass2);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  position:relative;overflow:hidden;
  transition:background 0.35s,border-color 0.35s,box-shadow 0.35s;flex-shrink:0;
}
.theme-btn:hover{box-shadow:0 0 16px rgba(110,231,183,0.35)}
.theme-thumb{
  position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent1),var(--accent2));
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s;
  display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
[data-theme="dark"] .theme-thumb{transform:translateX(24px)}
[data-theme="light"] .theme-thumb{transform:translateX(0px)}

.bottom-nav{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:150;display:flex;gap:0.25rem;padding:0.45rem 0.6rem;border-radius:999px;
  background:var(--glass2);backdrop-filter:var(--blur2) saturate(2);-webkit-backdrop-filter:var(--blur2) saturate(2);
  border:1.5px solid var(--glass-border2);
  box-shadow:0 8px 40px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.18);
  transition:background 0.4s,border-color 0.4s;
}
.bnav-btn{
  padding:0.52rem 1.15rem;border-radius:999px;font-size:0.78rem;font-weight:600;
  letter-spacing:0.05em;cursor:pointer;text-transform:uppercase;border:none;
  background:transparent;color:var(--muted);
  transition:all 0.28s cubic-bezier(0.34,1.56,0.64,1);position:relative;
  text-decoration:none;display:inline-block;
}
.bnav-btn:hover{color:var(--text);transform:scale(1.06)}
.bnav-btn.active{
  background:linear-gradient(135deg,rgba(110,231,183,0.22),rgba(167,139,250,0.20));
  color:var(--text);box-shadow:0 2px 14px rgba(110,231,183,0.20),inset 0 1px 0 rgba(255,255,255,0.15);
}
.bnav-btn.active::before{
  content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:18px;height:2.5px;border-radius:2px;
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
}

section{
  padding:7rem 3rem 5rem;max-width:900px;margin:0 auto;
  position:relative;z-index:1;animation:pageIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
  display:flex;flex-direction:column;align-items:center;
}
@keyframes pageIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes fadein{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.section-label{font-size:0.72rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent1);margin-bottom:0.4rem;text-align:center}
.section-title{font-family:'DM Serif Display',serif;font-size:clamp(1.9rem,3.5vw,2.7rem);color:var(--text);line-height:1.15;margin-bottom:0.8rem;text-align:center}
.divider{width:40px;height:3px;border-radius:3px;background:linear-gradient(90deg,var(--accent1),var(--accent2));margin:0 auto 2.5rem}

.about-card{
  max-width:680px;width:100%;padding:2.5rem;border-radius:28px;
  background:var(--glass2);backdrop-filter:var(--blur2) saturate(1.8);-webkit-backdrop-filter:var(--blur2) saturate(1.8);
  border:1px solid var(--glass-border2);
  box-shadow:0 8px 48px rgba(0,0,0,0.18),inset 0 1px 0 rgba(255,255,255,0.15);
  margin-bottom:1.5rem;animation:fadein 0.8s 0.1s ease both;
  position:relative;overflow:hidden;
}
.about-card::before{
  content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(110,231,183,0.12) 0%,transparent 70%);pointer-events:none;
}
.about-card p{color:var(--muted);line-height:1.85;font-size:0.95rem;margin-bottom:1.1rem}
.about-card p:last-child{margin-bottom:0}
.about-card p strong{color:var(--text);font-weight:600}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0.85rem;margin-top:1.5rem}
.stat-card{
  padding:1rem;border-radius:16px;text-align:center;
  background:var(--glass);border:1px solid var(--glass-border);
  transition:transform 0.2s,box-shadow 0.2s;
}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.15)}
.stat-num{font-family:'DM Serif Display',serif;font-size:1.9rem;line-height:1}
.stat-num.teal{color:var(--accent1)}.stat-num.purple{color:var(--accent2)}.stat-num.pink{color:var(--accent3)}
.stat-label{font-size:0.7rem;color:var(--muted);margin-top:0.25rem;letter-spacing:0.05em;text-transform:uppercase}

.connect-card{
  max-width:680px;width:100%;padding:2.2rem 2rem;border-radius:28px;
  background:var(--glass2);backdrop-filter:var(--blur2) saturate(1.8);-webkit-backdrop-filter:var(--blur2) saturate(1.8);
  border:1px solid var(--glass-border2);
  box-shadow:0 8px 48px rgba(0,0,0,0.18),inset 0 1px 0 var(--card-shine);
  animation:fadein 0.8s 0.2s ease both;
}
.card-label{display:flex;align-items:center;gap:0.6rem;margin-bottom:1.2rem}
.card-label span{font-size:0.72rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent1)}
.connect-card p{color:var(--muted);margin-bottom:1.6rem;line-height:1.7;font-size:0.92rem}
.social-links{display:flex;justify-content:center;gap:0.9rem;flex-wrap:wrap}
.social-btn{
  display:flex;align-items:center;gap:0.5rem;
  padding:0.65rem 1.35rem;border-radius:14px;font-size:0.84rem;font-weight:600;
  text-decoration:none;background:var(--glass);border:1.5px solid var(--glass-border2);color:var(--text);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1),background 0.22s,box-shadow 0.22s;
  user-select:none;
}
.social-btn:hover{transform:translateY(-4px) scale(1.05);background:var(--glass2);box-shadow:0 6px 20px rgba(0,0,0,0.18)}
.social-btn:active{transform:scale(0.97)}
.social-btn svg{width:18px;height:18px;flex-shrink:0}

.reveal{opacity:0;transform:translateY(22px);transition:opacity 0.65s ease,transform 0.65s ease}
.reveal.visible{opacity:1;transform:none}

footer{
  position:relative;z-index:1;border-top:1px solid var(--glass-border);
  padding:1.6rem 2.5rem;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:0.75rem;background:var(--footer-bg);
  backdrop-filter:var(--blur2);-webkit-backdrop-filter:var(--blur2);
  transition:background 0.55s ease,border-color 0.55s ease;margin-bottom:100px;
}
.footer-logo{
  font-family:'DM Serif Display',serif;font-size:1.1rem;
  background:linear-gradient(135deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.footer-copy{font-size:0.76rem;color:var(--muted2);display:flex;align-items:center;gap:0.4rem}

@media(max-width:768px){
  .top-bar{padding:0.9rem 1.2rem}
  section{padding:5.5rem 1.3rem 5rem}
  .stats-row{grid-template-columns:repeat(3,1fr)}
  footer{flex-direction:column;text-align:center;padding:1.2rem;margin-bottom:90px}
  .bottom-nav{bottom:14px;padding:0.35rem 0.4rem}
  .bnav-btn{padding:0.45rem 0.75rem;font-size:0.7rem}
}
</style>
</head>

<script>
document.addEventListener('copy',e=>{e.preventDefault();return false});
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('selectstart',e=>e.preventDefault());
document.addEventListener('dragstart',e=>e.preventDefault());

function toggleTheme(){
  const html=document.documentElement;
  const newTheme=html.getAttribute('data-theme')==='dark'?'light':'dark';
  html.setAttribute('data-theme',newTheme);
  localStorage.setItem('theme',newTheme);
  updateThemeIcons(newTheme);
}
function updateThemeIcons(t){
  document.getElementById('themeIconSun').style.display=t==='dark'?'none':'block';
  document.getElementById('themeIconMoon').style.display=t==='dark'?'block':'none';
}
const saved=localStorage.getItem('theme');
if(saved){document.documentElement.setAttribute('data-theme',saved);updateThemeIcons(saved);}
else{updateThemeIcons('dark');}

const obs=new IntersectionObserver((entries)=>{
  entries.forEach((e,i)=>{if(e.isIntersecting){setTimeout(()=>e.target.classList.add('visible'),i*90);obs.unobserve(e.target)}});
},{threshold:0.10});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

/* bio+chem canvas */
(function buildSciCanvas(){
  const canvas=document.getElementById('sci-canvas');
  const colors=['var(--accent1)','var(--accent2)','var(--accent3)','var(--accent4)'];
  const shapes=[
    `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.2" width="32" height="32"><ellipse cx="20" cy="20" rx="18" ry="7"/><ellipse cx="20" cy="20" rx="18" ry="7" transform="rotate(60 20 20)"/><ellipse cx="20" cy="20" rx="18" ry="7" transform="rotate(120 20 20)"/><circle cx="20" cy="20" r="2.5" fill="currentColor"/></svg>`,
    `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.2" width="28" height="28"><polygon points="20,4 34,12 34,28 20,36 6,28 6,12"/><polygon points="20,10 29,15 29,25 20,30 11,25 11,15" stroke-dasharray="3 2"/></svg>`,
    `<svg viewBox="0 0 20 50" fill="none" stroke="currentColor" stroke-width="1.3" width="16" height="40"><path d="M5,2 Q15,12 5,22 Q-5,32 5,42 Q15,52 5,62"/><line x1="5" y1="12" x2="15" y2="10"/><line x1="5" y1="22" x2="15" y2="24"/><line x1="5" y1="32" x2="15" y2="30"/></svg>`,
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" width="22" height="22"><path d="M10 2h4M9 2v7L4 18a2 2 0 0 0 1.7 3h12.6A2 2 0 0 0 20 18l-5-9V2"/><path d="M6 17h12" stroke-dasharray="2 2"/></svg>`,
    `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.2" width="28" height="28"><ellipse cx="18" cy="18" rx="15" ry="11"/><ellipse cx="18" cy="18" rx="8" ry="5" stroke-dasharray="2 2"/><circle cx="13" cy="16" r="1.5" fill="currentColor" opacity="0.5"/></svg>`,
    `<svg viewBox="0 0 40 28" fill="none" stroke="currentColor" stroke-width="1.3" width="32" height="22"><circle cx="20" cy="16" r="5"/><circle cx="6" cy="6" r="3.5"/><circle cx="34" cy="6" r="3.5"/><line x1="20" y1="11" x2="9" y2="8"/><line x1="20" y1="11" x2="31" y2="8"/></svg>`,
  ];
  for(let i=0;i<20;i++){
    const el=document.createElement('div');
    el.className='sci-elem';
    el.style.color=colors[i%colors.length];
    el.innerHTML=shapes[i%shapes.length];
    el.style.left=(Math.random()*98)+'%';
    el.style.bottom='-80px';
    el.style.setProperty('--rot',(Math.random()>0.5?1:-1)*Math.round(180+Math.random()*360)+'deg');
    el.style.animationDelay=(Math.random()*20)+'s';
    el.style.animationDuration=(14+Math.random()*12)+'s';
    canvas.appendChild(el);
  }
  const ringDefs=[
    {size:220,top:'5%',left:'-60px',color:'var(--accent1)',dur:'28s'},
    {size:160,bottom:'10%',right:'-50px',color:'var(--accent2)',dur:'22s'},
  ];
  ringDefs.forEach(r=>{
    const ring=document.createElement('div');
    ring.className='hex-ring';
    ring.style.cssText=`width:${r.size}px;height:${r.size}px;border-color:${r.color};animation-duration:${r.dur};`;
    if(r.top) ring.style.top=r.top;
    if(r.bottom) ring.style.bottom=r.bottom;
    if(r.left) ring.style.left=r.left;
    if(r.right) ring.style.right=r.right;
    canvas.appendChild(ring);
  });
  [{top:'20%',left:'15%',color:'#6EE7B7',delay:'0s'},{top:'65%',left:'80%',color:'#A78BFA',delay:'1.2s'},{top:'40%',left:'55%',color:'#F9A8D4',delay:'2.5s'}].forEach(n=>{
    const node=document.createElement('div');
    node.className='mol-node';
    node.style.cssText=`top:${n.top};left:${n.left};background:${n.color};animation-delay:${n.delay};`;
    canvas.appendChild(node);
  });
})();
</script>
</body>
</html>
